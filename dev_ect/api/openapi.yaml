openapi: 3.0.3
info:
  title: ECT Anonymization API
  version: 1.0.0
  description: A pipeline endpoint for anonymizing sensitive data in various file formats.
servers:
  - url: /api
paths:
  /anonymize:
    post:
      summary: Upload a batch of files (CSV, XLSX, TXT, PDF, DB) to redact sensitive PII.
      operationId: handlers.process_upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: The array of files to be anonymized.
      responses:
        '200':
          description: Successfully processed the files.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  processed_count:
                    type: integer
                  batch_results:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid request or unsupported file.
        '500':
          description: Internal server error during processing.